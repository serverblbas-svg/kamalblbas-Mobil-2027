<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>KAMAL PRO ULTRA - IPTV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg: #0a0a0a;
            --bg-light: #141414;
            --bg-card: #1a1a1a;
            --bg-hover: #222222;
            --bg-active: #ffffff;
            --border: #2a2a2a;
            --border-active: #ff3333;
            --text: #ffffff;
            --text-muted: #888888;
            --text-dark: #555555;
            --accent: #ff3333;
            --accent-glow: rgba(255, 51, 51, 0.3);
            --green: #00c853;
            --blue: #2962ff;
            --orange: #ff9800;
            --purple: #9c27b0;
            --cyan: #00bcd4;
            --yellow: #ffeb3b;
            --pink: #e91e63;
            --statusbar: #2196f3;
        }

        html, body {
            font-family: 'Cairo', 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            touch-action: manipulation;
        }

        /* ========== MOBILE STATUS BAR ========== */
        .status-bar {
            height: 28px;
            background: var(--statusbar);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            font-size: 0.75rem;
            color: white;
            flex-shrink: 0;
        }

        .status-left {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-icon {
            font-size: 0.7rem;
        }

        /* ========== TOP BAR ========== */
        .top-bar {
            height: 50px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            flex-shrink: 0;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .top-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            font-size: 1.2rem;
            position: relative;
        }

        .top-icon .badge {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .call-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 1.3rem;
            animation: phonePulse 2s infinite;
        }

        @keyframes phonePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .settings-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        /* ========== CHANNEL HEADER ========== */
        .ch-header {
            height: 45px;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            flex-shrink: 0;
        }

        .ch-count {
            background: var(--bg-card);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .ch-filter {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }

        .ch-filter i {
            color: var(--text-muted);
        }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* ========== CHANNEL LIST ========== */
        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 5px 10px;
            -webkit-overflow-scrolling: touch;
        }

        .channel-list::-webkit-scrollbar {
            width: 3px;
        }

        .channel-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .channel-row {
            display: flex;
            align-items: center;
            padding: 12px 10px;
            margin-bottom: 4px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            gap: 12px;
            position: relative;
            border: 1px solid transparent;
        }

        .channel-row:active {
            background: var(--bg-card);
            transform: scale(0.98);
        }

        .channel-row.active {
            background: var(--bg-active);
            border-color: var(--accent);
        }

        .channel-row.active .ch-name {
            color: #000;
            font-weight: 700;
        }

        .channel-row.active .ch-number {
            color: #000;
        }

        .ch-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .ch-name {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ch-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .ch-logo-wrap {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
            border: 1px solid var(--border);
        }

        .ch-logo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 3px;
        }

        .ch-logo-wrap i {
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        /* Auto-generated logo */
        .ch-logo-wrap.auto-logo {
            background: linear-gradient(135deg, var(--accent), var(--orange));
            color: white;
            font-weight: 800;
            font-size: 0.8rem;
            text-align: center;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
        }

        .ch-number {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            min-width: 25px;
            text-align: left;
        }

        /* ========== PLAYER OVERLAY ========== */
        .player-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 60px;
            background: var(--bg);
            z-index: 100;
            display: none;
            flex-direction: column;
        }

        .player-overlay.open {
            display: flex;
        }

        .player-top {
            height: 50px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            flex-shrink: 0;
        }

        .player-top-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-top-title i {
            color: var(--accent);
        }

        .player-close {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            font-size: 1.3rem;
            cursor: pointer;
        }

        .player-video-area {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #videoPlayer {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .player-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            gap: 15px;
        }

        .player-placeholder i {
            font-size: 3.5rem;
            color: var(--text-dark);
        }

        .player-placeholder-text {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 600;
        }

        .loading-dots {
            display: flex;
            gap: 6px;
            align-items: center;
            justify-content: center;
        }

        .loading-dots .dot {
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            animation: dotPulse 1.4s ease-in-out infinite;
        }

        .loading-dots .dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Player Controls */
        .player-controls-bar {
            height: 55px;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 10px;
            flex-shrink: 0;
        }

        .ctrl-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ctrl-btn:active {
            background: var(--bg-hover);
            transform: scale(0.9);
        }

        .ctrl-btn.play-btn {
            background: var(--accent);
            color: white;
            width: 50px;
            height: 50px;
            font-size: 1.3rem;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .ctrl-btn.play-btn:active {
            transform: scale(0.95);
        }

        /* ========== EPG SECTION ========== */
        .epg-section {
            background: var(--bg);
            border-top: 1px solid var(--border);
            padding: 10px 15px;
            max-height: 180px;
            overflow-y: auto;
        }

        .epg-title-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .epg-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .epg-title i {
            color: var(--accent);
        }

        .epg-channel {
            font-size: 0.8rem;
            color: var(--text);
            font-weight: 600;
        }

        .epg-row {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            margin-bottom: 6px;
            background: var(--bg-card);
            border-radius: 8px;
            gap: 12px;
            border-right: 2px solid transparent;
        }

        .epg-row.current {
            border-right-color: var(--accent);
            background: rgba(255, 51, 51, 0.08);
        }

        .epg-time {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text);
            min-width: 50px;
            font-family: monospace;
        }

        .epg-program {
            flex: 1;
            font-size: 0.85rem;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .epg-status {
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: 700;
        }

        .epg-status.live {
            background: rgba(0, 200, 83, 0.15);
            color: var(--green);
        }

        .epg-status.next {
            background: var(--bg-hover);
            color: var(--text-muted);
        }

        /* ========== BOTTOM NAV ========== */
        .bottom-nav {
            height: 60px;
            background: var(--bg);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-around;
            flex-shrink: 0;
            z-index: 50;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            color: var(--text-muted);
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            padding: 5px 20px;
            border: none;
            background: none;
            font-family: 'Cairo', sans-serif;
        }

        .nav-item i {
            font-size: 1.3rem;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .nav-item:active {
            transform: scale(0.9);
        }

        /* ========== GROUPS MODAL ========== */
        .groups-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }

        .groups-modal.open {
            display: flex;
        }

        .groups-sheet {
            background: var(--bg);
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-height: 70vh;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .groups-sheet-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .groups-sheet-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
        }

        .groups-sheet-close {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 1.3rem;
            cursor: pointer;
        }

        .groups-sheet-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .group-item {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }

        .group-item:active {
            background: var(--bg-card);
        }

        .group-item.active {
            background: var(--bg-card);
            border-right: 3px solid var(--accent);
        }

        .group-item.active .group-item-name {
            color: var(--accent);
            font-weight: 700;
        }

        .group-item-flag {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            min-width: 28px;
        }

        .group-item-icon {
            color: var(--orange);
            font-size: 0.85rem;
        }

        .group-item-name {
            flex: 1;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
        }

        .group-item-count {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            background: var(--bg-hover);
            padding: 3px 10px;
            border-radius: 12px;
        }

        /* ========== LOADING ========== */
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: var(--text-muted);
            gap: 15px;
        }

        .loading-screen i {
            font-size: 2.5rem;
            animation: spin 1s linear infinite;
            color: var(--accent);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== DESKTOP STYLES ========== */
        @media (min-width: 768px) {
            .status-bar { display: none; }
            .bottom-nav { display: none; }

            .main-content {
                flex-direction: row;
            }

            .channel-sidebar-desktop {
                width: 350px;
                background: var(--bg);
                border-left: 1px solid var(--border);
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            .player-overlay {
                position: relative;
                display: flex !important;
                bottom: 0;
                flex: 1;
            }

            .player-top { display: none; }
            .player-close { display: none; }
        }

        @media (max-width: 767px) {
            .desktop-only { display: none !important; }
        }
    </style>
</head>
<body>
    <!-- Mobile Status Bar -->
    <div class="status-bar">
        <div class="status-left">
            <i class="fas fa-signal status-icon"></i>
            <span>4G</span>
            <i class="fas fa-wifi status-icon"></i>
        </div>
        <div class="status-right">
            <i class="fas fa-battery-full status-icon"></i>
            <span id="clock">2:22</span>
        </div>
    </div>

    <!-- Top Bar -->
    <div class="top-bar">
        <div class="top-bar-left">
            <div class="top-icon">
                <i class="fas fa-bell"></i>
                <div class="badge"></div>
            </div>
            <div class="top-icon">
                <i class="fas fa-share-alt"></i>
            </div>
        </div>
        <div class="top-bar-right">
            <div class="call-icon">
                <i class="fas fa-phone-alt"></i>
            </div>
            <div class="settings-icon" onclick="toggleSettings()">
                <i class="fas fa-cog"></i>
            </div>
        </div>
    </div>

    <!-- Channel Header -->
    <div class="ch-header">
        <div class="ch-count" id="channelCount">0 کەناڵ</div>
        <div class="ch-filter" onclick="openGroupsModal()">
            <span id="currentFilter">All Channels</span>
            <i class="fas fa-bars"></i>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Channel List -->
        <div class="channel-list" id="channelList">
            <div class="loading-screen">
                <i class="fas fa-circle-notch"></i>
                <div>کەناڵەکان دەبارێن...</div>
            </div>
        </div>

        <!-- Player Overlay (Mobile) -->
        <div class="player-overlay" id="playerOverlay">
            <div class="player-top">
                <div class="player-top-title">
                    <i class="fas fa-tv"></i>
                    <span id="playerChannelName">کەناڵ</span>
                </div>
                <div class="player-close" onclick="closePlayer()">
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
            <div class="player-video-area">
                <video id="videoPlayer" playsinline webkit-playsinline></video>
                <div class="player-placeholder" id="playerPlaceholder">
                    <i class="fas fa-tv"></i>
                    <div class="player-placeholder-text">تکایە کەناڵێک هەڵبژێرە</div>
                    <div class="loading-dots" id="loadingDots" style="display:none;">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>
            </div>
            <div class="player-controls-bar">
                <button class="ctrl-btn" onclick="toggleMute()">
                    <i class="fas fa-volume-up" id="muteIcon"></i>
                </button>
                <button class="ctrl-btn play-btn" onclick="togglePlay()">
                    <i class="fas fa-play" id="playIcon"></i>
                </button>
                <button class="ctrl-btn" onclick="toggleFullscreen()">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
            <div class="epg-section" id="epgSection">
                <div class="epg-title-bar">
                    <div class="epg-title">
                        <i class="fas fa-calendar-alt"></i>
                        بەرنامەی ڕۆژانە
                    </div>
                    <div class="epg-channel" id="epgChannelName">-</div>
                </div>
                <div id="epgList">
                    <div class="epg-row current">
                        <div class="epg-time">--:--</div>
                        <div class="epg-program">کەناڵێک هەڵبژێرە</div>
                        <div class="epg-status live">LIVE</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
        <button class="nav-item" onclick="showSection('menu')">
            <i class="fas fa-bars"></i>
            <span>مێنیو</span>
        </button>
        <button class="nav-item active" onclick="showSection('home')">
            <i class="fas fa-home"></i>
            <span>سەرەکی</span>
        </button>
        <button class="nav-item" onclick="showSection('back')">
            <i class="fas fa-undo"></i>
            <span>گەڕانەوە</span>
        </button>
    </div>

    <!-- Groups Modal -->
    <div class="groups-modal" id="groupsModal">
        <div class="groups-sheet">
            <div class="groups-sheet-header">
                <div class="groups-sheet-title">گرووپەکان</div>
                <div class="groups-sheet-close" onclick="closeGroupsModal()">
                    <i class="fas fa-times"></i>
                </div>
            </div>
            <div class="groups-sheet-list" id="groupsSheetList">
                <!-- Groups loaded here -->
            </div>
        </div>
    </div>

    <script>
        const M3U_URL = 'https://xtream-ie.net/get.php?username=serverblbas&password=serverblbas&type=m3u_plus';
        const EPG_URL = 'https://xtream-ie.net/xmltv.php?username=serverblbas&password=serverblbas'; // لێرەدا کۆتیشنەکە چاککراوەتەوە

        let allChannels = [];
        let groups = {};
        let currentChannel = null;
        let currentGroup = null;
        let hls = null;
        let isPlaying = false;
        let favorites = JSON.parse(localStorage.getItem('kamal_favorites') || '[]');

        document.addEventListener('DOMContentLoaded', () => {
            loadChannels();
            updateClock();
            setInterval(updateClock, 60000);
            setupVideoEvents();
        });

        function updateClock() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const mins = now.getMinutes().toString().padStart(2, '0');
            const clock = document.getElementById('clock');
            if (clock) clock.textContent = hours + ':' + mins;
        }

        async function loadChannels() {
            try {
                const response = await fetch(M3U_URL);
                const data = await response.text();
                parseM3U(data);
                document.getElementById('channelCount').textContent = allChannels.length + ' کەناڵ';
                renderChannelList(allChannels);
                renderGroupsModal();
            } catch (error) {
                document.getElementById('channelList').innerHTML = `
                    <div class="loading-screen">
                        <i class="fas fa-exclamation-triangle"></i>
                        <div>هەڵە لە بارکردنی کەناڵەکان</div>
                    </div>
                `;
            }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            let currentGroup = 'گشتی';
            let currentChannel = null;
            let channelNum = 1;

            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    const groupMatch = line.match(/group-title="([^"]*)"/);
                    const logoMatch = line.match(/tvg-logo="([^"]*)"/);
                    const nameMatch = line.match(/,(.*)$/);

                    if (groupMatch) currentGroup = groupMatch[1] || 'گشتی';

                    if (!groups[currentGroup]) groups[currentGroup] = [];

                    currentChannel = {
                        num: channelNum++,
                        name: nameMatch ? nameMatch[1].trim() : 'کەناڵ',
                        logo: logoMatch ? logoMatch[1] : '',
                        group: currentGroup,
                        url: ''
                    };

                    groups[currentGroup].push(currentChannel);
                    allChannels.push(currentChannel);
                } else if (line.startsWith('http') && currentChannel) {
                    currentChannel.url = line;
                    currentChannel = null;
                }
            });
        }

        function generateAutoLogo(name) {
            const words = name.replace(/[^a-zA-Z0-9\s]/g, '').split(/\s+/).filter(w => w.length > 0);
            if (words.length >= 2) return (words[0][0] + words[1][0]).toUpperCase();
            if (words.length === 1) return words[0].substring(0, 2).toUpperCase();
            return 'TV';
        }

        function getChannelColor(name) {
            const colors = ['#ff3333', '#ff9800', '#00c853', '#2962ff', '#9c27b0', '#00bcd4', '#ffeb3b', '#e91e63'];
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return colors[Math.abs(hash) % colors.length];
        }

        function renderChannelList(channels) {
            const list = document.getElementById('channelList');
            list.innerHTML = '';

            if (channels.length === 0) {
                list.innerHTML = `<div class="loading-screen"><i class="fas fa-inbox"></i><div>هیچ کەناڵێک نیە</div></div>`;
                return;
            }

            channels.forEach(channel => {
                const row = document.createElement('div');
                row.className = 'channel-row';
                row.dataset.name = channel.name.toLowerCase();

                let logoHtml;
                if (channel.logo) {
                    logoHtml = `<img src="${channel.logo}" alt="${channel.name}" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\'auto-logo\'>${generateAutoLogo(channel.name)}</div>'">`;
                } else {
                    const color = getChannelColor(channel.name);
                    logoHtml = `<div class="auto-logo" style="background:linear-gradient(135deg, ${color}, ${getChannelColor(channel.name + '2')})">${generateAutoLogo(channel.name)}</div>`;
                }

                const isFav = favorites.includes(channel.name);

                row.innerHTML = `
                    <div class="ch-info">
                        <div class="ch-name">${channel.name}</div>
                        <div class="ch-meta">${channel.group}</div>
                    </div>
                    <div class="ch-logo-wrap">${logoHtml}</div>
                    <div class="ch-number">${channel.num}</div>
                `;

                row.onclick = () => playChannel(channel, row);
                list.appendChild(row);
            });
        }

        function renderGroupsModal() {
            const list = document.getElementById('groupsSheetList');
            list.innerHTML = '';

            // Favorites
            const favItem = document.createElement('div');
            favItem.className = 'group-item' + (currentGroup === 'favorites' ? ' active' : '');
            favItem.onclick = () => selectGroupFromModal('favorites');
            favItem.innerHTML = `
                <div class="group-item-name" style="display:flex;align-items:center;gap:8px;">
                    <i class="fas fa-heart" style="color:var(--accent);"></i>
                    Favorites
                </div>
                <div class="group-item-count">${favorites.length}</div>
            `;
            list.appendChild(favItem);

            // All channels
            const allItem = document.createElement('div');
            allItem.className = 'group-item' + (currentGroup === null ? ' active' : '');
            allItem.onclick = () => selectGroupFromModal(null);
            allItem.innerHTML = `
                <div class="group-item-name">All Channels</div>
                <div class="group-item-count">${allChannels.length}</div>
            `;
            list.appendChild(allItem);

            // Groups
            Object.keys(groups).sort().forEach(groupName => {
                const count = groups[groupName].length;
                const item = document.createElement('div');
                item.className = 'group-item' + (currentGroup === groupName ? ' active' : '');

                const langMatch = groupName.match(/^([A-Z]{2})\s*/);
                const lang = langMatch ? langMatch[1] : '';
                const nameWithoutLang = lang ? groupName.substring(lang.length).trim() : groupName;

                item.innerHTML = `
                    <div class="group-item-flag">${lang}</div>
                    <div class="group-item-icon"><i class="fas fa-bolt"></i></div>
                    <div class="group-item-name">${nameWithoutLang}</div>
                    <div class="group-item-count">${count}</div>
                `;

                item.onclick = () => selectGroupFromModal(groupName);
                list.appendChild(item);
            });
        }

        function selectGroupFromModal(groupName) {
            currentGroup = groupName;
            closeGroupsModal();

            let channelsToShow = [];
            let title = '';

            if (groupName === 'favorites') {
                channelsToShow = allChannels.filter(ch => favorites.includes(ch.name));
                title = 'Favorites';
                document.getElementById('channelCount').textContent = channelsToShow.length + ' دڵخواز';
            } else if (groupName === null) {
                channelsToShow = allChannels;
                title = 'All Channels';
                document.getElementById('channelCount').textContent = allChannels.length + ' کەناڵ';
            } else {
                channelsToShow = groups[groupName] || [];
                title = groupName;
                document.getElementById('channelCount').textContent = channelsToShow.length + ' کەناڵ';
            }

            document.getElementById('currentFilter').textContent = title;
            renderChannelList(channelsToShow);
            renderGroupsModal();
        }

        function openGroupsModal() {
            document.getElementById('groupsModal').classList.add('open');
        }

        function closeGroupsModal() {
            document.getElementById('groupsModal').classList.remove('open');
        }

        function playChannel(channel, rowElement) {
            if (!channel || !channel.url) return;

            currentChannel = channel;

            document.querySelectorAll('.channel-row').forEach(r => r.classList.remove('active'));
            if (rowElement) rowElement.classList.add('active');

            // Open player overlay on mobile
            document.getElementById('playerOverlay').classList.add('open');
            document.getElementById('playerChannelName').textContent = channel.name;

            const video = document.getElementById('videoPlayer');
            const placeholder = document.getElementById('playerPlaceholder');
            const loadingDots = document.getElementById('loadingDots');

            placeholder.style.display = 'none';
            loadingDots.style.display = 'flex';

            if (hls) { hls.destroy(); hls = null; }

            if (Hls.isSupported()) {
                hls = new Hls({ debug: false, enableWorker: true, lowLatencyMode: true });
                hls.loadSource(channel.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    isPlaying = true;
                    updatePlayIcon();
                    loadingDots.style.display = 'none';
                });
                hls.on(Hls.Events.ERROR, () => { loadingDots.style.display = 'none'; });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = channel.url;
                video.play();
                isPlaying = true;
                updatePlayIcon();
                loadingDots.style.display = 'none';
            }

            document.getElementById('epgChannelName').textContent = channel.name;
            renderEPG(channel.name);
        }

        function closePlayer() {
            document.getElementById('playerOverlay').classList.remove('open');
            const video = document.getElementById('videoPlayer');
            video.pause();
            if (hls) { hls.destroy(); hls = null; }
            isPlaying = false;
            updatePlayIcon();
        }

        function renderEPG(channelName) {
            const epgList = document.getElementById('epgList');
            const now = new Date();
            const times = [];
            for (let i = -1; i < 3; i++) {
                const t = new Date(now.getTime() + i * 60 * 60 * 1000);
                times.push(t.toLocaleTimeString('en', {hour: '2-digit', minute: '2-digit', hour12: false}));
            }

            epgList.innerHTML = `
                <div class="epg-row current">
                    <div class="epg-time">${times[1]}</div>
                    <div class="epg-program">پەخشی ڕاستەوخۆ - ${channelName}</div>
                    <div class="epg-status live">LIVE</div>
                </div>
                <div class="epg-row">
                    <div class="epg-time">${times[2]}</div>
                    <div class="epg-program">بەرنامەی داهاتوو</div>
                    <div class="epg-status next">داهاتوو</div>
                </div>
            `;
        }

        function setupVideoEvents() {
            const video = document.getElementById('videoPlayer');
            video.addEventListener('play', () => { isPlaying = true; updatePlayIcon(); });
            video.addEventListener('pause', () => { isPlaying = false; updatePlayIcon(); });
        }

        function togglePlay() {
            const video = document.getElementById('videoPlayer');
            if (video.paused) video.play(); else video.pause();
        }

        function updatePlayIcon() {
            const icon = document.getElementById('playIcon');
            icon.className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
        }

        function toggleMute() {
            const video = document.getElementById('videoPlayer');
            video.muted = !video.muted;
            const icon = document.getElementById('muteIcon');
            icon.className = video.muted ? 'fas fa-volume-mute' : 'fas fa-volume-up';
        }

        function toggleFullscreen() {
            const video = document.getElementById('videoPlayer');
            if (video.requestFullscreen) video.requestFullscreen();
            else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
        }

        function showSection(section) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');

            if (section === 'home') {
                closePlayer();
            } else if (section === 'back') {
                history.back();
            }
        }

        function toggleSettings() {
            alert('ڕێکخستنەکان');
        }
    </script>
</body>
</html>
